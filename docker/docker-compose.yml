version: '3.8'

services:
  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master
    hostname: spark-master
    user: root
    environment:
      - MSYS_NO_PATHCONV=1
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ../data:/opt/spark/data
      - ../src:/opt/spark/src
      - ../logs:/opt/spark/logs
    command: >
      bash -c "
      apt-get update -y && 
      apt-get install -y python3 python3-pip && 
      pip3 install --no-cache-dir faker pandas numpy pyspark && 
      /opt/spark/sbin/start-master.sh && 
      tail -f /dev/null
      "

  spark-worker-1:
    image: apache/spark:3.5.1
    container_name: spark-worker-1
    hostname: spark-worker-1
    user: root
    depends_on:
      - spark-master
    ports:
      - "8081:8081"
    volumes:
      - ../data:/opt/spark/data
      - ../src:/opt/spark/src
      - ../logs:/opt/spark/logs
    command: >
      bash -c "
      /opt/spark/sbin/start-worker.sh spark://spark-master:7077 --cores 2 --memory 2g &&
      tail -f /dev/null
      "

  spark-worker-2:
    image: apache/spark:3.5.1
    container_name: spark-worker-2
    hostname: spark-worker-2
    user: root
    depends_on:
      - spark-master
    ports:
      - "8082:8081"
    volumes:
      - ../data:/opt/spark/data
      - ../src:/opt/spark/src
      - ../logs:/opt/spark/logs
    command: >
      bash -c "
      /opt/spark/sbin/start-worker.sh spark://spark-master:7077 --cores 2 --memory 2g &&
      tail -f /dev/null
      "